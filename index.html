<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Baloo+2:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --milk:#FBF5EC; --cream:#FFFDF8; --ink:#4A3B30; --ink-soft:#9C8A78;
    --bean:#EE9B8F; --bean-deep:#E07C6E; --ginger:#E0A35E; --ginger-deep:#CC8A3E;
    --sage:#9DB39A; --cloud:#F0E7DA; --line:#EDE2D2;
    --warn:#E8924E; --over:#E0685C;
    --shadow:0 8px 24px rgba(120,90,60,.10);
    --shadow-soft:0 3px 10px rgba(120,90,60,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--milk);
    color:var(--ink);
    font-family:"Noto Sans SC","Baloo 2",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .num{font-family:"Baloo 2",sans-serif;font-variant-numeric:tabular-nums}
  .title,.seg button,.sec-title,.bal-label,.mini .k,.week-top .lab,.mood-msg,
  .tx .cat,.empty p,.save-btn,.del-btn,.fab,.edit-btn,.type-toggle button,
  .field-lab,.sheet h3,.foot,.inp label,.quick-row button,.toast{font-family:"ZCOOL KuaiLe",cursive;letter-spacing:.3px}
  .mood-cat{animation:bob 2.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .app{max-width:460px;margin:0 auto;padding:18px 16px calc(120px + env(safe-area-inset-bottom));position:relative}

  /* header */
  .head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .logo-cat{width:48px;height:auto;flex:none}
  .title{font-family:"ZCOOL KuaiLe",cursive;font-size:26px;line-height:1;letter-spacing:.5px}
  .title small{display:block;font-family:"Noto Sans SC";font-weight:400;font-size:11px;color:var(--ink-soft);letter-spacing:2px;margin-top:4px}

  /* segmented toggle */
  .seg{display:flex;background:var(--cloud);border-radius:16px;padding:5px;gap:5px;margin-bottom:18px}
  .seg button{flex:1;border:none;background:transparent;font-family:inherit;font-weight:700;font-size:15px;color:var(--ink-soft);padding:11px 0;border-radius:12px;cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center;gap:6px}
  .seg button.on{background:var(--cream);color:var(--ink);box-shadow:var(--shadow-soft)}
  .seg .paw{font-size:13px;opacity:.6}
  .seg button.on .paw{opacity:1}

  .card{background:var(--cream);border-radius:22px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px}

  /* main balance */
  .bal-label{font-size:13px;color:var(--ink-soft);letter-spacing:1px}
  .bal{font-family:"Baloo 2";font-weight:700;font-size:40px;line-height:1.1;margin:6px 0 16px;letter-spacing:-.5px}
  .bal .yen{font-size:24px;color:var(--ink-soft);margin-right:3px}
  .mini-row{display:flex;gap:12px}
  .mini{flex:1;background:var(--milk);border-radius:16px;padding:13px 14px}
  .mini .k{font-size:12px;color:var(--ink-soft);margin-bottom:5px}
  .mini .v{font-family:"Baloo 2";font-weight:600;font-size:19px}
  .mini.exp .v{color:var(--bean-deep)}
  .mini.inc .v{color:var(--sage)}
  .month-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin:2px 0 16px}
  .m-arrow{width:34px;height:34px;border-radius:11px;border:1.5px solid var(--line);background:var(--milk);color:var(--ink-soft);font-family:"Baloo 2";font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .m-arrow:hover:not(:disabled){border-color:var(--bean);color:var(--bean-deep)}
  .m-arrow:disabled{opacity:.3;cursor:default}
  .month-label{font-size:15px;font-weight:700;min-width:130px;text-align:center;color:var(--ink)}

  /* weekly */
  .week-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .week-top .lab{font-size:13px;color:var(--ink-soft);letter-spacing:1px}
  .limit-amt{font-family:"Baloo 2";font-weight:700;font-size:34px;line-height:1.1;margin-top:4px}
  .limit-amt .yen{font-size:20px;color:var(--ink-soft);margin-right:2px}
  .edit-btn{border:1.5px solid var(--line);background:transparent;color:var(--ink-soft);font-family:inherit;font-size:13px;font-weight:600;padding:7px 13px;border-radius:12px;cursor:pointer;white-space:nowrap}
  .edit-btn:hover{border-color:var(--bean);color:var(--bean-deep)}

  .mood-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;padding:6px 0 2px}
  .mood-cat{width:120px;height:120px}
  .mood-msg{font-size:14px;line-height:1.6;margin-top:8px;max-width:280px;color:var(--ink)}
  .mood-msg.alert{color:var(--over);font-weight:600}

  .bar-track{height:14px;background:var(--cloud);border-radius:99px;overflow:hidden;margin:16px 0 10px;position:relative}
  .bar-fill{height:100%;border-radius:99px;background:var(--sage);transition:width .5s cubic-bezier(.2,.8,.2,1);min-width:0}
  .bar-fill.warn{background:var(--warn)}
  .bar-fill.over{background:var(--over)}
  .bar-meta{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-soft)}
  .bar-meta b{font-family:"Baloo 2";font-weight:600;color:var(--ink)}
  .bar-meta .rem-over b{color:var(--over)}

  /* list */
  .sec-title{font-size:13px;color:var(--ink-soft);letter-spacing:1px;margin:22px 4px 10px;font-weight:700}
  .day-group{margin-bottom:6px}
  .day-head{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);padding:0 6px 6px}
  .day-head .d-sum{font-family:"Baloo 2"}
  .tx{display:flex;align-items:center;gap:12px;background:var(--cream);border-radius:16px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow-soft);position:relative;cursor:pointer;transition:.15s}
  .tx:active{transform:scale(.985)}
  .tx .ic{width:42px;height:42px;border-radius:13px;background:var(--milk);display:flex;align-items:center;justify-content:center;font-size:21px;flex:none}
  .tx .info{flex:1;min-width:0}
  .tx .cat{font-weight:500;font-size:15px;display:flex;align-items:center;gap:6px}
  .tx .note{font-size:12px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx .amt{font-family:"Baloo 2";font-weight:600;font-size:17px;white-space:nowrap}
  .tx .amt.exp{color:var(--ink)}
  .tx .amt.inc{color:var(--sage)}

  .save-btn{width:100%;border:none;background:var(--bean);color:#fff;font-family:inherit;font-weight:700;font-size:16px;padding:15px;border-radius:16px;cursor:pointer;transition:.2s;margin-top:4px}

  .del-btn:hover{border-color:var(--over)}

  .limit-input .y{font-family:"Baloo 2";font-size:26px;color:var(--ink-soft)}
  .limit-input input{font-family:"Baloo 2";font-weight:700;font-size:40px;border:none;background:transparent;color:var(--ink);width:auto;max-width:200px;text-align:center;outline:none}
  .limit-input input::placeholder{color:var(--cloud)}
  .quick-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
  .quick-row button{border:1.5px solid var(--line);background:var(--milk);border-radius:11px;padding:8px 14px;font-family:"Baloo 2";font-weight:600;font-size:14px;color:var(--ink-soft);cursor:pointer}
  .quick-row button:hover{border-color:var(--ginger);color:var(--ginger-deep)}

  .toast{position:fixed;left:50%;bottom:calc(100px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
         background:var(--ink);color:#fff;padding:12px 20px;border-radius:14px;font-size:14px;font-weight:500;z-index:60;opacity:0;pointer-events:none;transition:.3s;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .foot{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:24px;opacity:.7}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  :focus-visible{outline:3px solid var(--ginger);outline-offset:2px}
  .tail{display:inline-block;animation:sway 3s ease-in-out infinite;transform-origin:bottom center}
  @keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(6deg)}}
</style>

<body>
<div class="app">

      <path d="M76 50 L81 30 Q77 27 70 36 Z" fill="#EBB8AE" stroke="#7A6450" stroke-width="2.6" stroke-linejoin="round"/>

      <ellipse cx="34" cy="64" rx="5.5" ry="3.2" fill="#EBB8AE" opacity=".6"/><ellipse cx="82" cy="64" rx="5.5" ry="3.2" fill="#EBB8AE" opacity=".6"/>

<script>
const KEY='catledger:v1';
const SYM='¥';
const EXP_CATS=[
  {id:'food',e:'🍚',n:'餐饮'},{id:'snack',e:'🍪',n:'零食'},{id:'transit',e:'🚌',n:'交通'},
  {id:'shop',e:'🛍️',n:'购物'},{id:'home',e:'🏠',n:'居家'},{id:'fun',e:'🎮',n:'娱乐'},
  {id:'health',e:'💊',n:'医疗'},{id:'cat',e:'🐱',n:'猫主子'},{id:'gift',e:'🎁',n:'人情'},{id:'other',e:'🐾',n:'其他'}
];
const INC_CATS=[
  {id:'salary',e:'💰',n:'工资'},{id:'bonus',e:'🧧',n:'红包'},{id:'sell',e:'🏷️',n:'卖闲置'},
  {id:'invest',e:'📈',n:'理财'},{id:'other_inc',e:'✨',n:'其他'}
];
const catMap={};[...EXP_CATS,...INC_CATS].forEach(c=>catMap[c.id]=c);

let data={transactions:[],weeklyLimit:0};
let activeTab='main';
let viewYM=(function(){const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};})();
let editingId=null;
let form={type:'expense',cat:'food'};

/* ---------- storage ---------- */
const hasCloud=(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function');
async function load(){
  try{
    if(hasCloud){const r=await window.storage.get(KEY);if(r&&r.value)data=JSON.parse(r.value);}
    else{const v=localStorage.getItem(KEY);if(v)data=JSON.parse(v);}
  }catch(e){ /* first run / no saved data, keep defaults */ }
  if(!Array.isArray(data.transactions))data.transactions=[];
  if(typeof data.weeklyLimit!=='number')data.weeklyLimit=0;
}
async function save(){
  try{
    if(hasCloud)await window.storage.set(KEY,JSON.stringify(data));
    else localStorage.setItem(KEY,JSON.stringify(data));
  }catch(e){ toast('保存失败了喵，稍后再试'); }
}

/* ---------- date helpers ---------- */
function startOfWeek(d){
  const x=new Date(d); x.setHours(0,0,0,0);
  const day=(x.getDay()+6)%7; // Mon=0
  x.setDate(x.getDate()-day);
  return x;
}
function weekKeyOf(dateStr){
  const s=startOfWeek(new Date(dateStr));
  return s.getFullYear()+'-'+(s.getMonth()+1)+'-'+s.getDate();
}
function currentWeekKey(){return weekKeyOf(new Date());}
function todayISO(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10);}
function fmtDay(iso){
  const d=new Date(iso+'T00:00:00'); const t=new Date(); t.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  if(diff===0)return '今天';
  if(diff===-1)return '昨天';
  const w=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  return (d.getMonth()+1)+'月'+d.getDate()+'日 '+w;
}
function money(n){
  const v=Math.round((n+Number.EPSILON)*100)/100;
  return v.toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:2});
}

/* ---------- computed ---------- */
function weekSpent(){
  const wk=currentWeekKey();
  return data.transactions
    .filter(t=>t.ledger==='weekly'&&weekKeyOf(t.date)===wk)
    .reduce((s,t)=>s+(t.type==='expense'?t.amount:-t.amount),0);
}
function balance(){
  return data.transactions.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);
}
function monthSum(type,y,m){
  return data.transactions.filter(t=>{const d=new Date(t.date+'T00:00:00');return d.getFullYear()===y&&d.getMonth()===m&&t.type===type;})
    .reduce((s,t)=>s+t.amount,0);
}
function monthTx(y,m){
  return data.transactions.filter(t=>{const d=new Date(t.date+'T00:00:00');return d.getFullYear()===y&&d.getMonth()===m;});
}
function curYM(){const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};}
function isCurrentYM(){const c=curYM();return viewYM.y===c.y&&viewYM.m===c.m;}
function shiftMonth(delta){
  let m=viewYM.m+delta,y=viewYM.y;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  const c=curYM();
  if(y>c.y||(y===c.y&&m>c.m))return; // 不能翻到未来
  viewYM={y,m};render();
}

/* ---------- cat mascot ---------- */
function catSVG(mood){
  // mood: 'none' | 'happy' | 'calm' | 'nervous' | 'over'  ·  奶团猫 mochi style
  const OL='#7A6450',BODY='#FBF3E6',EAR='#EBB8AE',DK='#4A3B30',BLU='#9DD3F0';
  const base=
    `<path d="M38 50 L33 32 Q37 29 44 37 Z" fill="${EAR}" stroke="${OL}" stroke-width="2.6" stroke-linejoin="round"/>`+
    `<path d="M82 50 L87 32 Q83 29 76 37 Z" fill="${EAR}" stroke="${OL}" stroke-width="2.6" stroke-linejoin="round"/>`+
    `<path d="M22 80 Q22 46 60 46 Q98 46 98 80 Q98 104 60 104 Q22 104 22 80 Z" fill="${BODY}" stroke="${OL}" stroke-width="2.6"/>`+
    `<g stroke="${OL}" stroke-width="1.6" stroke-linecap="round" opacity=".55"><path d="M24 78 L11 75 M24 85 L12 89"/><path d="M96 78 L109 75 M96 85 L108 89"/></g>`;
  const blush=o=>`<ellipse cx="34" cy="83" rx="6" ry="3.6" fill="${EAR}" opacity="${o}"/><ellipse cx="86" cy="83" rx="6" ry="3.6" fill="${EAR}" opacity="${o}"/>`;
  let eyes,mouth,extra='',bl=blush(.6);
  if(mood==='happy'){
    eyes=`<path d="M41 78 Q46 71 51 78" stroke="${DK}" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M69 78 Q74 71 79 78" stroke="${DK}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    mouth=`<path d="M56 83 Q58 86 60 83 Q62 86 64 83" stroke="${OL}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
    bl=blush(.72);
    extra=`<text x="95" y="44" font-size="14">🎵</text><text x="11" y="46" font-size="12">✨</text>`;
  }else if(mood==='calm'){
    eyes=`<ellipse cx="46" cy="77" rx="3.4" ry="6" fill="${DK}"/><ellipse cx="74" cy="77" rx="3.4" ry="6" fill="${DK}"/>`;
    mouth=`<path d="M55 83 Q60 88 65 83" stroke="${OL}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  }else if(mood==='nervous'){
    eyes=`<ellipse cx="46" cy="77" rx="3.6" ry="6" fill="${DK}"/><ellipse cx="74" cy="77" rx="3.6" ry="6" fill="${DK}"/>`;
    mouth=`<path d="M56 85 Q58 83 60 85 Q62 87 64 85" stroke="${OL}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
    extra=`<path d="M93 52 q4 8 0 11 q-4 -3 0 -11 Z" fill="${BLU}" stroke="${OL}" stroke-width="1.2" stroke-linejoin="round"/>`;
  }else if(mood==='over'){
    eyes=`<ellipse cx="46" cy="76" rx="4.4" ry="7" fill="${DK}"/><ellipse cx="74" cy="76" rx="4.4" ry="7" fill="${DK}"/>`+
         `<circle cx="47.6" cy="73.5" r="1.8" fill="#fff"/><circle cx="75.6" cy="73.5" r="1.8" fill="#fff"/>`;
    extra=`<path d="M42 81 q-3 7 0 10 q3 -3 0 -10 Z" fill="${BLU}" stroke="${OL}" stroke-width="1" stroke-linejoin="round"/>`+
          `<path d="M78 81 q-3 7 0 10 q3 -3 0 -10 Z" fill="${BLU}" stroke="${OL}" stroke-width="1" stroke-linejoin="round"/>`;
    mouth=`<path d="M56 87 Q60 83 64 87" stroke="${OL}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
    bl=blush(.55);
  }else{
    eyes=`<ellipse cx="46" cy="77" rx="3.4" ry="6" fill="${DK}"/><ellipse cx="74" cy="77" rx="3.4" ry="6" fill="${DK}"/>`;
    mouth=`<path d="M57 83 Q60 86 63 83" stroke="${OL}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
    extra=`<text x="93" y="46" font-size="16">❓</text>`;
  }
  return `<svg class="mood-cat" viewBox="0 0 120 116" aria-hidden="true">${base}${bl}${eyes}${mouth}${extra}</svg>`;
}
const OVER_MSGS=[
  '喵呜～本周的小鱼干超额啦 (´•ω•`)',
  '铲屎官，钱包在喵喵叫救命了！',
  '购物车再睡一觉再付款好不好喵～',
  '超啦超啦，下周本喵帮你看紧一点🐾',
  '没关系的，吸口猫，下周重新出发喵～'
];

/* ---------- render ---------- */
function render(){activeTab==='main'?renderMain():renderWeek();}

function renderMain(){
  const bal=balance();
  const {y,m}=viewYM;
  const exp=monthSum('expense',y,m),inc=monthSum('income',y,m);
  const cur=isCurrentYM();
  let h=`<div class="card">
    <div class="bal-label">总结余</div>
    <div class="bal num"><span class="yen">${SYM}</span>${money(bal)}</div>
    <div class="month-nav">
      <button id="mPrev" class="m-arrow" aria-label="上个月">‹</button>
      <div class="month-label">${y}年${m+1}月${cur?' · 本月':''}</div>
      <button id="mNext" class="m-arrow" aria-label="下个月"${cur?' disabled':''}>›</button>
    </div>
    <div class="mini-row">
      <div class="mini exp"><div class="k">支出</div><div class="v num">${SYM}${money(exp)}</div></div>
      <div class="mini inc"><div class="k">收入</div><div class="v num">${SYM}${money(inc)}</div></div>
    </div>
  </div>`;
  const list=monthTx(y,m);
  h+=`<div class="sec-title">${m+1}月明细</div>`;
  h+=txListHTML(list, cur?'这个月还没记账，点下面的肉垫记第一笔吧～':'这个月没有记录哦');
  document.getElementById('view').innerHTML=h;
  const p=document.getElementById('mPrev'),n=document.getElementById('mNext');
  if(p)p.onclick=()=>shiftMonth(-1);
  if(n)n.onclick=()=>shiftMonth(1);
}

function renderWeek(){
  const limit=data.weeklyLimit, spent=weekSpent();
  const rem=limit-spent;
  let ratio=limit>0?spent/limit:0;
  let mood,msg,msgAlert=false;
  if(limit<=0){mood='none';msg='先给自己定个每周花销额度吧，本喵帮你盯着～';}
  else if(ratio>1){mood='over';msg=OVER_MSGS[Math.floor(Math.random()*OVER_MSGS.length)];msgAlert=true;}
  else if(ratio>=0.85){mood='nervous';msg='快到额度啦，剩下的几天悠着点喵 (˙꒳˙ )';}
  else if(ratio>=0.5){mood='calm';msg='节奏不错，继续保持喵～';}
  else{mood='happy';msg='花得很克制，本喵给你打呼噜奖励 (=^･ω･^=)';}

  const fillCls=ratio>1?'over':(ratio>=0.85?'warn':'');
  const pct=Math.min(ratio*100,100);

  let h=`<div class="card">
    <div class="week-top">
      <div><div class="lab">本周额度</div>
        <div class="limit-amt num">${limit>0?`<span class="yen">${SYM}</span>${money(limit)}`:'<span style="font-size:20px;color:var(--ink-soft)">未设置</span>'}</div>
      </div>
      <button class="edit-btn" id="editLimit">${limit>0?'修改':'设置'}</button>
    </div>
    <div class="mood-wrap">
      ${catSVG(mood)}
      <div class="mood-msg ${msgAlert?'alert':''}">${msg}</div>
    </div>`;
  if(limit>0){
    h+=`<div class="bar-track"><div class="bar-fill ${fillCls}" style="width:${pct}%"></div></div>
    <div class="bar-meta">
      <span>已用 <b class="num">${SYM}${money(spent)}</b></span>
      <span class="${rem<0?'rem-over':''}">${rem>=0?'剩余':'超支'} <b class="num">${SYM}${money(Math.abs(rem))}</b></span>
    </div>`;
  }
  h+=`</div>`;
  h+=`<div class="sec-title">本周明细 <span style="font-weight:400">· 记在这里会同步到主账本</span></div>`;
  const wk=currentWeekKey();
  const list=data.transactions.filter(t=>t.ledger==='weekly'&&weekKeyOf(t.date)===wk);
  h+=txListHTML(list,'本周还没花钱喵，乖孩子！');
  document.getElementById('view').innerHTML=h;
  const el=document.getElementById('editLimit');
  if(el)el.onclick=openLimit;
}

function txListHTML(list,emptyMsg){
  if(!list.length){
    return `<div class="empty">${catSVG('happy')}<p>${emptyMsg}</p></div>`;
  }
  const sorted=[...list].sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:(b.created-a.created));
  const groups={};
  sorted.forEach(t=>{(groups[t.date]=groups[t.date]||[]).push(t);});
  let h='';
  Object.keys(groups).forEach(date=>{
    const items=groups[date];
    const daySum=items.reduce((s,t)=>s+(t.type==='expense'?-t.amount:t.amount),0);
    h+=`<div class="day-group"><div class="day-head"><span>${fmtDay(date)}</span><span class="d-sum num">${daySum<0?'-':'+'}${SYM}${money(Math.abs(daySum))}</span></div>`;
    items.forEach(t=>{
      const c=catMap[t.cat]||{e:'🐾',n:'其他'};
      const wk=(t.ledger==='weekly'&&activeTab==='main')?'<span class="badge-week">周</span>':'';
      h+=`<div class="tx" data-id="${t.id}">
        <div class="ic">${c.e}</div>
        <div class="info">
          <div class="cat">${c.n}${wk}</div>
          ${t.note?`<div class="note">${esc(t.note)}</div>`:''}
        </div>
        <div class="amt ${t.type} num">${t.type==='expense'?'-':'+'}${SYM}${money(t.amount)}</div>
      </div>`;
    });
    h+=`</div>`;
  });
  return h;
}
function esc(s){return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}

/* ---------- add / edit sheet ---------- */
function openAdd(){
  editingId=null;
  form={type:'expense',cat:'food'};
  document.getElementById('addTitle').textContent=activeTab==='week'?'记一笔（本周）':'记一笔';
  document.getElementById('amtIn').value='';
  document.getElementById('noteIn').value='';
  document.getElementById('dateIn').value=todayISO();
  document.getElementById('delBtn').style.display='none';
  syncType();renderCats();updateSave();
  showSheet('addSheet');
  setTimeout(()=>document.getElementById('amtIn').focus(),300);
}
function openEdit(t){
  editingId=t.id;
  form={type:t.type,cat:t.cat};
  document.getElementById('addTitle').textContent='编辑这一笔';
  document.getElementById('amtIn').value=t.amount;
  document.getElementById('noteIn').value=t.note||'';
  document.getElementById('dateIn').value=t.date;
  document.getElementById('delBtn').style.display='block';
  syncType();renderCats();updateSave();
  showSheet('addSheet');
}
function syncType(){
  const exp=form.type==='expense';
  document.getElementById('tExp').className=exp?'on-exp':'';
  document.getElementById('tInc').className=exp?'':'on-inc';
}
function renderCats(){
  const cats=form.type==='expense'?EXP_CATS:INC_CATS;
  if(!cats.find(c=>c.id===form.cat))form.cat=cats[0].id;
  document.getElementById('catGrid').innerHTML=cats.map(c=>
    `<button data-cat="${c.id}" class="${c.id===form.cat?'on':''}"><span class="e">${c.e}</span><span class="n">${c.n}</span></button>`
  ).join('');
  document.querySelectorAll('#catGrid button').forEach(b=>b.onclick=()=>{form.cat=b.dataset.cat;renderCats();});
}
function updateSave(){
  const v=parseFloat(document.getElementById('amtIn').value);
  document.getElementById('saveBtn').disabled=!(v>0);
}
function doSave(){
  const amt=parseFloat(document.getElementById('amtIn').value);
  if(!(amt>0))return;
  const note=document.getElementById('noteIn').value.trim();
  const date=document.getElementById('dateIn').value||todayISO();
  if(editingId){
    const t=data.transactions.find(x=>x.id===editingId);
    if(t){t.amount=amt;t.type=form.type;t.cat=form.cat;t.note=note;t.date=date;}
    toast('改好啦 🐾');
  }else{
    data.transactions.push({
      id:Date.now()+'-'+Math.random().toString(36).slice(2,6),
      created:Date.now(),amount:amt,type:form.type,cat:form.cat,note,date,
      ledger:activeTab==='week'?'weekly':'main'
    });
    toast(activeTab==='week'?'记好啦，已同步到主账本 🐾':'记好啦 🐾');
  }
  const dd=new Date(date+'T00:00:00');
  viewYM={y:dd.getFullYear(),m:dd.getMonth()};
  save();hideSheets();render();
}
function doDelete(){
  data.transactions=data.transactions.filter(x=>x.id!==editingId);
  save();hideSheets();render();toast('删掉啦');
}

/* ---------- limit sheet ---------- */
function openLimit(){
  document.getElementById('limitIn').value=data.weeklyLimit||'';
  document.getElementById('quickRow').innerHTML=[200,300,500,800,1000].map(v=>`<button data-v="${v}">${SYM}${v}</button>`).join('');
  document.querySelectorAll('#quickRow button').forEach(b=>b.onclick=()=>{document.getElementById('limitIn').value=b.dataset.v;});
  showSheet('limitSheet');
  setTimeout(()=>document.getElementById('limitIn').focus(),300);
}
function saveLimit(){
  const v=parseFloat(document.getElementById('limitIn').value)||0;
  data.weeklyLimit=v;save();hideSheets();render();toast('额度定好啦 🐾');
}

/* ---------- sheet plumbing ---------- */
function showSheet(id){document.getElementById('scrim').classList.add('show');document.getElementById(id).classList.add('show');}
function hideSheets(){
  document.getElementById('scrim').classList.remove('show');
  document.getElementById('addSheet').classList.remove('show');
  document.getElementById('limitSheet').classList.remove('show');
}
let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2000);}

/* ---------- events ---------- */
function bind(){
  document.getElementById('tabMain').onclick=()=>{activeTab='main';document.getElementById('tabMain').classList.add('on');document.getElementById('tabWeek').classList.remove('on');render();};
  document.getElementById('tabWeek').onclick=()=>{activeTab='week';document.getElementById('tabWeek').classList.add('on');document.getElementById('tabMain').classList.remove('on');render();};
  document.getElementById('fab').onclick=openAdd;
  document.getElementById('scrim').onclick=hideSheets;
  document.getElementById('tExp').onclick=()=>{form.type='expense';syncType();renderCats();};
  document.getElementById('tInc').onclick=()=>{form.type='income';syncType();renderCats();};
  document.getElementById('amtIn').oninput=updateSave;
  document.getElementById('saveBtn').onclick=doSave;
  document.getElementById('delBtn').onclick=doDelete;
  document.getElementById('saveLimit').onclick=saveLimit;
  document.getElementById('view').addEventListener('click',e=>{
    const tx=e.target.closest('.tx');
    if(tx){const t=data.transactions.find(x=>x.id===tx.dataset.id);if(t)openEdit(t);}
  });
  document.getElementById('resetBtn').onclick=async()=>{
    if(confirm('确定清空全部记账数据吗？这个操作没法撤销喵。')){
      data={transactions:[],weeklyLimit:0};await save();render();toast('都清空啦');
    }
  };
}

/* ---------- boot ---------- */
(async function(){
  await load();
  bind();
  render();
})();
</script>
