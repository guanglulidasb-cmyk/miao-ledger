<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Baloo+2:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --milk:#FBF5EC; --cream:#FFFDF8; --ink:#4A3B30; --ink-soft:#9C8A78;
    --bean:#EE9B8F; --bean-deep:#E07C6E; --ginger:#E0A35E; --ginger-deep:#CC8A3E;
    --sage:#9DB39A; --cloud:#F0E7DA; --line:#EDE2D2;
    --warn:#E8924E; --over:#E0685C;
    --shadow:0 8px 24px rgba(120,90,60,.10);
    --shadow-soft:0 3px 10px rgba(120,90,60,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--milk);
    color:var(--ink);
    font-family:"Noto Sans SC","Baloo 2",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .num{font-family:"Baloo 2",sans-serif;font-variant-numeric:tabular-nums}
  .title,.seg button,.sec-title,.bal-label,.mini .k,.week-top .lab,.mood-msg,
  .tx .cat,.empty p,.save-btn,.del-btn,.fab,.edit-btn,.type-toggle button,
  .field-lab,.sheet h3,.foot,.inp label,.quick-row button,.toast{font-family:"ZCOOL KuaiLe",cursive;letter-spacing:.3px}
  .mood-cat{animation:bob 2.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .app{max-width:460px;margin:0 auto;padding:18px 16px calc(120px + env(safe-area-inset-bottom));position:relative}

  /* header */
  .head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .logo-cat{width:48px;height:auto;flex:none}
  .title{font-family:"ZCOOL KuaiLe",cursive;font-size:26px;line-height:1;letter-spacing:.5px}
  .title small{display:block;font-family:"Noto Sans SC";font-weight:400;font-size:11px;color:var(--ink-soft);letter-spacing:2px;margin-top:4px}

  /* segmented toggle */
  .seg{display:flex;background:var(--cloud);border-radius:16px;padding:5px;gap:5px;margin-bottom:18px}
  .seg button{flex:1;border:none;background:transparent;font-family:inherit;font-weight:700;font-size:15px;color:var(--ink-soft);padding:11px 0;border-radius:12px;cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center;gap:6px}
  .seg button.on{background:var(--cream);color:var(--ink);box-shadow:var(--shadow-soft)}
  .seg .paw{font-size:13px;opacity:.6}
  .seg button.on .paw{opacity:1}

  .card{background:var(--cream);border-radius:22px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px}

  /* main balance */
  .bal-label{font-size:13px;color:var(--ink-soft);letter-spacing:1px}
  .bal{font-family:"Baloo 2";font-weight:700;font-size:40px;line-height:1.1;margin:6px 0 16px;letter-spacing:-.5px}
  .bal .yen{font-size:24px;color:var(--ink-soft);margin-right:3px}
  .mini-row{display:flex;gap:12px}
  .mini{flex:1;background:var(--milk);border-radius:16px;padding:13px 14px}
  .mini .k{font-size:12px;color:var(--ink-soft);margin-bottom:5px}
  .mini .v{font-family:"Baloo 2";font-weight:600;font-size:19px}
  .mini.exp .v{color:var(--bean-deep)}
  .mini.inc .v{color:var(--sage)}
  .month-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin:2px 0 16px}
  .m-arrow{width:34px;height:34px;border-radius:11px;border:1.5px solid var(--line);background:var(--milk);color:var(--ink-soft);font-family:"Baloo 2";font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .m-arrow:hover:not(:disabled){border-color:var(--bean);color:var(--bean-deep)}
  .m-arrow:disabled{opacity:.3;cursor:default}
  .month-label{font-size:15px;font-weight:700;min-width:130px;text-align:center;color:var(--ink)}

  /* weekly */
  .week-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .week-top .lab{font-size:13px;color:var(--ink-soft);letter-spacing:1px}
  .limit-amt{font-family:"Baloo 2";font-weight:700;font-size:34px;line-height:1.1;margin-top:4px}
  .limit-amt .yen{font-size:20px;color:var(--ink-soft);margin-right:2px}
  .edit-btn{border:1.5px solid var(--line);background:transparent;color:var(--ink-soft);font-family:inherit;font-size:13px;font-weight:600;padding:7px 13px;border-radius:12px;cursor:pointer;white-space:nowrap}
  .edit-btn:hover{border-color:var(--bean);color:var(--bean-deep)}

  .mood-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;padding:6px 0 2px}
  .mood-cat{width:120px;height:120px}
  .mood-msg{font-size:14px;line-height:1.6;margin-top:8px;max-width:280px;color:var(--ink)}
  .mood-msg.alert{color:var(--over);font-weight:600}

  .bar-track{height:14px;background:var(--cloud);border-radius:99px;overflow:hidden;margin:16px 0 10px;position:relative}
  .bar-fill{height:100%;border-radius:99px;background:var(--sage);transition:width .5s cubic-bezier(.2,.8,.2,1);min-width:0}
  .bar-fill.warn{background:var(--warn)}
  .bar-fill.over{background:var(--over)}
  .bar-meta{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-soft)}
  .bar-meta b{font-family:"Baloo 2";font-weight:600;color:var(--ink)}
  .bar-meta .rem-over b{color:var(--over)}

  /* list */
  .sec-title{font-size:13px;color:var(--ink-soft);letter-spacing:1px;margin:22px 4px 10px;font-weight:700}
  .day-group{margin-bottom:6px}
  .day-head{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);padding:0 6px 6px}
  .day-head .d-sum{font-family:"Baloo 2"}
  .tx{display:flex;align-items:center;gap:12px;background:var(--cream);border-radius:16px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow-soft);position:relative;cursor:pointer;transition:.15s}
  .tx:active{transform:scale(.985)}
  .tx .ic{width:42px;height:42px;border-radius:13px;background:var(--milk);display:flex;align-items:center;justify-content:center;font-size:21px;flex:none}
  .tx .info{flex:1;min-width:0}
  .tx .cat{font-weight:500;font-size:15px;display:flex;align-items:center;gap:6px}
  .tx .note{font-size:12px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx .amt{font-family:"Baloo 2";font-weight:600;font-size:17px;white-space:nowrap}
  .tx .amt.exp{color:var(--ink)}
  .tx .amt.inc{color:var(--sage)}

<script>
const KEY='catledger:v1';
const SYM='¥';
const EXP_CATS=[
  {id:'food',e:'🍚',n:'餐饮'},{id:'snack',e:'🍪',n:'零食'},{id:'transit',e:'🚌',n:'交通'},
  {id:'shop',e:'🛍️',n:'购物'},{id:'home',e:'🏠',n:'居家'},{id:'fun',e:'🎮',n:'娱乐'},
  {id:'health',e:'💊',n:'医疗'},{id:'cat',e:'🐱',n:'猫主子'},{id:'gift',e:'🎁',n:'人情'},{id:'other',e:'🐾',n:'其他'}
];
const INC_CATS=[
  {id:'salary',e:'💰',n:'工资'},{id:'bonus',e:'🧧',n:'红包'},{id:'sell',e:'🏷️',n:'卖闲置'},
  {id:'invest',e:'📈',n:'理财'},{id:'other_inc',e:'✨',n:'其他'}
];
const catMap={};[...EXP_CATS,...INC_CATS].forEach(c=>catMap[c.id]=c);

let data={transactions:[],weeklyLimit:0,monthlyLimit:0,theme:'light',payday:15,homeTab:'main'};
let activeTab='main';
let viewYM=(function(){const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};})();
let searchQ='';
let editingId=null;
let form={type:'expense',cat:'food'};

/* ---------- storage ---------- */
const hasCloud=(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function');
async function load(){
  try{
    if(hasCloud){const r=await window.storage.get(KEY);if(r&&r.value)data=JSON.parse(r.value);}
    else{const v=localStorage.getItem(KEY);if(v)data=JSON.parse(v);}
  }catch(e){ /* first run / no saved data, keep defaults */ }
  if(!Array.isArray(data.transactions))data.transactions=[];
  if(typeof data.weeklyLimit!=='number')data.weeklyLimit=0;
  if(typeof data.monthlyLimit!=='number')data.monthlyLimit=0;
  if(data.theme!=='dark')data.theme='light';
  if(!(data.payday>=1&&data.payday<=28))data.payday=15;
  if(data.homeTab!=='week')data.homeTab='main';
  if(!Array.isArray(data.savings))data.savings=[];
  if(typeof data.savingsGoal!=='number')data.savingsGoal=0;
}
async function save(){
  try{
    if(hasCloud)await window.storage.set(KEY,JSON.stringify(data));
    else localStorage.setItem(KEY,JSON.stringify(data));
  }catch(e){ toast('保存失败了喵，稍后再试'); }
}

/* ---------- date helpers ---------- */
function startOfWeek(d){
  const x=new Date(d); x.setHours(0,0,0,0);
  const day=(x.getDay()+6)%7; // Mon=0
  x.setDate(x.getDate()-day);
  return x;
}
function weekKeyOf(dateStr){
  const s=startOfWeek(new Date(dateStr));
  return s.getFullYear()+'-'+(s.getMonth()+1)+'-'+s.getDate();
}
function currentWeekKey(){return weekKeyOf(new Date());}
function todayISO(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10);}
function fmtDay(iso){
  const d=new Date(iso+'T00:00:00'); const t=new Date(); t.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  if(diff===0)return '今天';
  if(diff===-1)return '昨天';
  const w=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  return (d.getMonth()+1)+'月'+d.getDate()+'日 '+w;
}
function money(n){
  const v=Math.round((n+Number.EPSILON)*100)/100;
  return v.toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:2});
}

/* ---------- computed ---------- */
function weekSpent(){
  const wk=currentWeekKey();
  return data.transactions
    .filter(t=>t.ledger==='weekly'&&weekKeyOf(t.date)===wk)
    .reduce((s,t)=>s+(t.type==='expense'?t.amount:-t.amount),0);
}
function balance(){
  return data.transactions.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);
}
function monthSum(type,y,m){
  return data.transactions.filter(t=>{const d=new Date(t.date+'T00:00:00');return d.getFullYear()===y&&d.getMonth()===m&&t.type===type;})
    .reduce((s,t)=>s+t.amount,0);
}
function monthTx(y,m){
  return data.transactions.filter(t=>{const d=new Date(t.date+'T00:00:00');return d.getFullYear()===y&&d.getMonth()===m;});
}
function curYM(){const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};}
function isCurrentYM(){const c=curYM();return viewYM.y===c.y&&viewYM.m===c.m;}
function shiftMonth(delta){
  let m=viewYM.m+delta,y=viewYM.y;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  const c=curYM();
  if(y>c.y||(y===c.y&&m>c.m))return; // 不能翻到未来
  viewYM={y,m};render();
}
function localISO(dt){const z=new Date(dt);z.setMinutes(z.getMinutes()-z.getTimezoneOffset());return z.toISOString().slice(0,10);}
function computeStreak(){
  const days=new Set(data.transactions.map(t=>t.date));
  if(!days.size)return 0;
  let d=new Date(); d.setHours(0,0,0,0);
  if(!days.has(localISO(d))){ d.setDate(d.getDate()-1); if(!days.has(localISO(d)))return 0; }
  let n=0;
  while(days.has(localISO(d))){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function monthCatStats(y,m){
  const exp=data.transactions.filter(t=>{const d=new Date(t.date+'T00:00:00');return d.getFullYear()===y&&d.getMonth()===m&&t.type==='expense';});
  const total=exp.reduce((s,t)=>s+t.amount,0);
  const by={}; exp.forEach(t=>{by[t.cat]=(by[t.cat]||0)+t.amount;});
  const rows=Object.keys(by).map(cat=>({cat,amt:by[cat],pct:total?by[cat]/total*100:0})).sort((a,b)=>b.amt-a.amt);
  return {total,rows};
}

function txListHTML(list,emptyMsg){
  if(!list.length){
    return `<div class="empty">${catSVG('happy')}<p>${emptyMsg}</p></div>`;
  }
  const sorted=[...list].sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:(b.created-a.created));
  const groups={};
  sorted.forEach(t=>{(groups[t.date]=groups[t.date]||[]).push(t);});
  let h='';
  Object.keys(groups).forEach(date=>{
    const items=groups[date];
    const daySum=items.reduce((s,t)=>s+(t.type==='expense'?-t.amount:t.amount),0);
    const payBadge=(parseInt(date.slice(8,10),10)===data.payday)?' <span class="badge-pay">💰 发薪日</span>':'';
    h+=`<div class="day-group"><div class="day-head"><span>${fmtDay(date)}${payBadge}</span><span class="d-sum num">${daySum<0?'-':'+'}${SYM}${money(Math.abs(daySum))}</span></div>`;
    items.forEach(t=>{
      const c=catMap[t.cat]||{e:'🐾',n:'其他'};
      const wk=(t.ledger==='weekly'&&activeTab==='main')?'<span class="badge-week">周</span>':'';
      h+=`<div class="tx" data-id="${t.id}">
        <div class="ic">${c.e}</div>
        <div class="info">
          <div class="cat">${c.n}${wk}</div>
          ${t.note?`<div class="note">${esc(t.note)}</div>`:''}
        </div>
        <div class="amt ${t.type} num">${t.type==='expense'?'-':'+'}${SYM}${money(t.amount)}</div>
      </div>`;
    });
    h+=`</div>`;
  });
  return h;
}
function esc(s){return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}

function recentQuick(){

  const sorted=[...data.transactions].sort((a,b)=>(b.created||0)-(a.created||0));
  for(const t of sorted){
    const key=t.type+'|'+t.cat+'|'+(t.note||'')+'|'+t.amount;
    if(seen.has(key))continue; seen.add(key); out.push(t);

  return out;
}

  document.getElementById('addSheet').classList.remove('show');
  document.getElementById('limitSheet').classList.remove('show');
  document.getElementById('monthLimitSheet').classList.remove('show');
  document.getElementById('settingsSheet').classList.remove('show');
  document.getElementById('saveSheet').classList.remove('show');
  document.getElementById('goalSheet').classList.remove('show');

let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2000);}

/* ---------- events ---------- */
/* ---------- backup: export / import ---------- */
async function exportData(){
  const payload={app:'MiaoLedger',version:1,exportedAt:new Date().toISOString(),data};
  const text=JSON.stringify(payload,null,2);
  const stamp=new Date().toISOString().slice(0,10);
  const fname=`miao-ledger-backup-${stamp}.json`;
  // 1) iOS / mobile: share sheet with file (save to Files, send to self, etc.)
  try{
    if(navigator.canShare){
      const file=new File([text],fname,{type:'application/json'});
      if(navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:'喵记账备份'}); return; }
    }
  }catch(e){ if(e&&e.name==='AbortError')return; /* canceled */ }
  // 2) desktop / Android: download a file
  try{
    const blob=new Blob([text],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},150);
    toast('备份已导出 🐾'); return;
  }catch(e){}
  // 3) last resort: copy to clipboard
  try{ await navigator.clipboard.writeText(text); toast('备份已复制到剪贴板，粘到备忘录存好'); }
  catch(e){ toast('导出失败了喵，换 Safari 再试一次'); }
}
function importData(file){
  const reader=new FileReader();
  reader.onload=()=>{
    let d;
    try{
      const parsed=JSON.parse(reader.result);
      d=(parsed&&parsed.data)?parsed.data:parsed; // 兼容带壳/不带壳
      if(!d||!Array.isArray(d.transactions))throw new Error('bad');
    }catch(e){ toast('这个文件读不出来喵，请选喵记账导出的备份'); return; }
    if(!confirm('导入会用备份里的账覆盖当前所有数据，确定吗？')) return;
    data={transactions:d.transactions,
          weeklyLimit:typeof d.weeklyLimit==='number'?d.weeklyLimit:0,
          monthlyLimit:typeof d.monthlyLimit==='number'?d.monthlyLimit:0,
          theme:d.theme==='dark'?'dark':'light',
          payday:(d.payday>=1&&d.payday<=28)?d.payday:15,
          homeTab:d.homeTab==='week'?'week':'main',
          savings:Array.isArray(d.savings)?d.savings:[],
          savingsGoal:typeof d.savingsGoal==='number'?d.savingsGoal:0};
    applyTheme(); activeTab=data.homeTab==='week'?'week':'main'; syncTabUI(); save(); render(); toast('导入成功 🐾');
  };
  reader.readAsText(file);
}

/* ---------- savings jar 攒钱罐 ---------- */
let sForm={type:'in'};
let sEditingId=null;
function savingsTotal(){ return data.savings.reduce((s,t)=>s+(t.type==='out'?-t.amount:t.amount),0); }
function renderSave(){
  const total=savingsTotal(), goal=data.savingsGoal;
  let mood='happy';
  if(goal>0){const r=total/goal; mood=r>=1?'happy':(r>=0.5?'calm':'none');}
  let h=`<button class="back-btn" id="backBtn">‹ 返回</button>
  <div class="card" style="text-align:center">
    <div class="save-illu">${catSVG(mood)}<span class="coin">🪙</span></div>
    <div class="bal-label">已经攒了</div>
    <div class="bal num"><span class="yen">${SYM}</span>${money(total)}</div>`;
  if(goal>0){
    const rem=goal-total, ratio=goal?total/goal:0, pct=Math.min(Math.max(ratio*100,0),100), done=total>=goal;
    h+=`<div class="bar-track" style="margin-top:16px"><div class="bar-fill" style="width:${pct}%;background:var(--sage)"></div></div>
      <div class="bar-meta" style="margin-top:8px">
        <span>目标 <b class="num">${SYM}${money(goal)}</b></span>
        <span>${done?'已达成 🎉':('还差 <b class="num">'+SYM+money(Math.abs(rem))+'</b>')}</span>
      </div>
      <div style="margin-top:12px">${done?'<span style="color:var(--sage);font-weight:600">攒满啦！奶团猫为你转圈圈 🎉</span>':'<button class="set-link" id="editGoal">改目标</button>'}</div>`;
  }else{
    h+=`<div style="margin-top:16px"><button class="set-link" id="editGoal">＋ 设一个攒钱目标</button></div>`;
  }
  h+=`</div><div class="sec-title">存取记录</div><div id="slist"></div>`;
  document.getElementById('view').innerHTML=h;
  const eg=document.getElementById('editGoal'); if(eg)eg.onclick=openGoal;
  const bb=document.getElementById('backBtn'); if(bb)bb.onclick=backFromSavings;
  document.getElementById('slist').innerHTML=savingsListHTML(data.savings);
}
function savingsListHTML(list){
  if(!list.length) return `<div class="empty">${catSVG('happy')}<p>还没往罐子里存钱喵，点下面的肉垫存第一笔吧～</p></div>`;
  const sorted=[...list].sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:((b.created||0)-(a.created||0)));
  const groups={}; sorted.forEach(t=>{(groups[t.date]=groups[t.date]||[]).push(t);});
  let h='';
  Object.keys(groups).forEach(date=>{
    h+=`<div class="day-group"><div class="day-head"><span>${fmtDay(date)}</span></div>`;
    groups[date].forEach(t=>{
      h+=`<div class="tx" data-sid="${t.id}">
        <div class="ic">${t.type==='out'?'💸':'🐷'}</div>
        <div class="info"><div class="cat">${t.type==='out'?'取出':'存入'}</div>${t.note?`<div class="note">${esc(t.note)}</div>`:''}</div>
        <div class="amt ${t.type==='out'?'exp':'inc'} num">${t.type==='out'?'-':'+'}${SYM}${money(t.amount)}</div>
      </div>`;
    });
    h+=`</div>`;
  });
  return h;
}
function openSave(t){
  sEditingId=(t&&t.id)?t.id:null;
  sForm={type:(t&&t.type)||'in'};
  document.getElementById('saveTitle').textContent=sEditingId?'编辑这一笔':'存一笔';
  document.getElementById('sAmtIn').value=(t&&t.amount)?t.amount:'';
  document.getElementById('sNoteIn').value=(t&&t.note)||'';
  document.getElementById('sDateIn').value=(t&&t.date)||todayISO();
  document.getElementById('sDelBtn').style.display=sEditingId?'block':'none';
  syncSType();
  showSheet('saveSheet');
  if(!sEditingId)setTimeout(()=>document.getElementById('sAmtIn').focus(),300);
}
function syncSType(){
  const isIn=sForm.type==='in';
  document.getElementById('sIn').className=isIn?'on-inc':'';
  document.getElementById('sOut').className=isIn?'':'on-exp';
}
function sSave(){
  const amt=parseFloat(document.getElementById('sAmtIn').value);
  if(!(amt>0)){toast('填个金额喵～');return;}
  const note=document.getElementById('sNoteIn').value.trim();
  const date=document.getElementById('sDateIn').value||todayISO();
  if(sEditingId){
    const t=data.savings.find(x=>x.id===sEditingId);
    if(t){t.amount=amt;t.type=sForm.type;t.note=note;t.date=date;}
    toast('改好啦 🐾');
  }else{
    data.savings.push({id:Date.now()+'-'+Math.random().toString(36).slice(2,6),created:Date.now(),amount:amt,type:sForm.type,note,date});
    toast(sForm.type==='out'?'取出记好啦':'存进去啦，棒棒！🐷');
  }
  save();hideSheets();render();
}
function sDelete(){ data.savings=data.savings.filter(x=>x.id!==sEditingId); save();hideSheets();render();toast('删掉啦'); }
function openGoal(){
  document.getElementById('goalIn').value=data.savingsGoal||'';
  document.getElementById('goalQuick').innerHTML=[1000,3000,5000,10000,20000].map(v=>`<button data-v="${v}">${SYM}${v}</button>`).join('');
  document.querySelectorAll('#goalQuick button').forEach(b=>b.onclick=()=>{document.getElementById('goalIn').value=b.dataset.v;});
  showSheet('goalSheet');
  setTimeout(()=>document.getElementById('goalIn').focus(),300);
}
function saveGoal(){ const v=parseFloat(document.getElementById('goalIn').value)||0; data.savingsGoal=v;save();hideSheets();render();toast('目标定好啦 🐾'); }

function bind(){
  document.getElementById('tabMain').onclick=()=>setTab('main');
  document.getElementById('tabWeek').onclick=()=>setTab('week');
  document.getElementById('fab').onclick=()=>{ activeTab==='save'?openSave():openAdd(); };
  document.getElementById('scrim').onclick=hideSheets;
  document.getElementById('tExp').onclick=()=>{form.type='expense';syncType();renderCats();};
  document.getElementById('tInc').onclick=()=>{form.type='income';syncType();renderCats();};
  document.getElementById('amtIn').oninput=updateSave;
  document.getElementById('saveBtn').onclick=doSave;
  document.getElementById('delBtn').onclick=doDelete;
  document.getElementById('saveLimit').onclick=saveLimit;
  document.getElementById('saveMonthLimit').onclick=saveMonthLimit;
  document.getElementById('themeBtn').onclick=toggleTheme;
  document.getElementById('settingsBtn').onclick=openSettings;
  document.getElementById('saveSettings').onclick=saveSettings;
  document.getElementById('dtMain').onclick=()=>{setForm.homeTab='main';syncDefaultTabUI();};
  document.getElementById('dtWeek').onclick=()=>{setForm.homeTab='week';syncDefaultTabUI();};
  document.getElementById('sIn').onclick=()=>{sForm.type='in';syncSType();};
  document.getElementById('sOut').onclick=()=>{sForm.type='out';syncSType();};
  document.getElementById('sSaveBtn').onclick=sSave;
  document.getElementById('sDelBtn').onclick=sDelete;
  document.getElementById('saveGoal').onclick=saveGoal;
  document.getElementById('view').addEventListener('click',e=>{
    const tx=e.target.closest('.tx');
    if(!tx)return;
    if(tx.dataset.sid){const t=data.savings.find(x=>x.id===tx.dataset.sid);if(t)openSave(t);return;}
    const t=data.transactions.find(x=>x.id===tx.dataset.id);if(t)openEdit(t);
  });
  document.getElementById('exportBtn').onclick=exportData;
  document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
  document.getElementById('importFile').onchange=e=>{const f=e.target.files[0];if(f)importData(f);e.target.value='';};
  document.getElementById('resetBtn').onclick=async()=>{
    if(confirm('确定清空全部记账数据吗？这个操作没法撤销喵。')){
      data={transactions:[],weeklyLimit:0,monthlyLimit:0,theme:data.theme,payday:data.payday,homeTab:data.homeTab,savings:[],savingsGoal:0};await save();render();toast('都清空啦');
    }
  };
}

/* ---------- boot ---------- */
(async function(){
  await load();
  bind();
  applyTheme();
  activeTab=data.homeTab==='week'?'week':'main';
  syncTabUI();
  render();
})();
</script>
